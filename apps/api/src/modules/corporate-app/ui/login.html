<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Corporate Login | CMS Banking</title>
    <link rel="stylesheet" href="/corporate/login/styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand-block">
          <p class="eyebrow">Embedded Banking Platform</p>
          <h1>Corporate Login</h1>
          <p class="lead">
            Sign in as a corporate operations user to manage beneficiaries,
            transactions, and refunds inside the customer workspace.
          </p>
          <div class="hint-card">
            <strong>Test users for Maya Pharma</strong>
            <p>`grvmaker` / `9771`</p>
            <p>`grvchecker` / `9771`</p>
          </div>
        </div>

        <form id="login-form" class="login-form">
          <label>
            <span>Username</span>
            <input name="username" placeholder="grvmaker" required />
          </label>

          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="9771" required />
          </label>

          <button type="submit" class="button button-primary">Sign In</button>
        </form>

        <pre id="login-response" class="response-box">Ready.</pre>
      </section>
    </main>

    <script src="/corporate/login/app.js"></script>
  </body>
</html>
