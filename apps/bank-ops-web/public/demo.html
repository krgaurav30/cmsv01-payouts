<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Store - Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-700: #334155;
      --slate-900: #0f172a;
      --success: #10b981;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--slate-50);
      color: var(--slate-900);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px -5px rgba(15, 23, 42, 0.05), 0 20px 40px -10px rgba(15, 23, 42, 0.04);
      border: 1px solid var(--slate-100);
      padding: 32px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .store-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .store-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 800;
      font-size: 20px;
    }

    .store-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .product-card {
      background: var(--slate-50);
      border: 1px solid var(--slate-100);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .product-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--slate-700);
      margin-bottom: 4px;
    }

    .product-desc {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 16px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 1px dashed var(--slate-200);
      padding-top: 16px;
    }

    .price-label {
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
    }

    .price-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--slate-900);
      letter-spacing: -0.03em;
    }

    .pay-btn {
      width: 100%;
      height: 52px;
      background-color: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
      transition: all 0.2s ease;
    }

    .pay-btn:hover:not(:disabled) {
      background-color: var(--primary-hover);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35);
      transform: translateY(-1px);
    }

    .pay-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .pay-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--slate-900);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100001;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast-icon {
      color: var(--success);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="store-header">
      <div class="store-logo">A</div>
      <div class="store-name">Acme Digital Store</div>
    </div>

    <div class="product-card">
      <div class="product-title">FuturePay Developer Suite Pro</div>
      <div class="product-desc">Instant access to developer sandboxes, payment simulation environments, and integration tools.</div>
      
      <div class="price-row">
        <span class="price-label">Total Amount</span>
        <span class="price-value">INR 1,250.00</span>
      </div>
    </div>

    <button id="pay-btn" class="pay-btn">
      <span class="spinner" id="btn-spinner"></span>
      <span id="btn-text">Pay with FuturePay</span>
    </button>
  </div>

  <div class="toast" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toast-message">Payment completed successfully!</span>
  </div>

  <!-- Load static SDK -->
  <script src="/v1/sdk.js"></script>
  <script>
    const payBtn = document.getElementById("pay-btn");
    const btnSpinner = document.getElementById("btn-spinner");
    const btnText = document.getElementById("btn-text");
    const toast = document.getElementById("toast");
    const toastMsg = document.getElementById("toast-message");

    // Local Test Credentials (seeded in db)
    const testPayload = {
      bankTenantId: "bank-alpha",
      corporateTenantId: "corp-maya-pharama-028616",
      corporateId: "co-maya-pharama-106925",
      transactionReference: "demo-txn-" + Math.floor(Math.random() * 1000000),
      amount: {
        value: 1250.00,
        currency: "INR"
      },
      beneficiaryId: "8826654341"
    };

    const apiKey = "cms_live_f8fc5dea856294c0243847f7e50bd70209c9";

    payBtn.onclick = async () => {
      // 1. Enter Loading State
      payBtn.disabled = true;
      btnSpinner.style.display = "block";
      btnText.innerText = "Initiating Secure Session...";

      try {
        // 2. Call backend partner endpoint to generate session
        const response = await fetch("/v1/partner/checkout/sessions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey
          },
          body: JSON.stringify(testPayload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Failed to initiate payment session");
        }

        btnText.innerText = "Checkout Loaded";

        // 3. Open Checkout Session in Side Sheet Layout
        FuturePay.checkout({
          sessionId: data.checkoutSessionId,
          layout: "sidesheet",
          onCompleted: (payload) => {
            showToast("Payment completed successfully! Command: " + payload.commandId);
            resetButton();
          },
          onCancelled: () => {
            showToast("Payment checkout cancelled by user.");
            resetButton();
          }
        });

      } catch (err) {
        alert("Error: " + err.message);
        resetButton();
      }
    };

    function resetButton() {
      payBtn.disabled = false;
      btnSpinner.style.display = "none";
      btnText.innerText = "Pay with FuturePay";
    }

    function showToast(message) {
      toastMsg.innerText = message;
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 5000);
    }
  </script>
</body>
</html>
